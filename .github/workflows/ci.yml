name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      bump:
        description: Release component to bump
        required: true
        type: choice
        default: minor
        options:
          - major
          - minor
      dispatch_token:
        description: Idempotency token supplied by cmd/release
        required: false
        type: string
      expected_revision:
        description: Main revision verified by cmd/release
        required: false
        type: string
      reconciliation_source:
        description: Main revision for which this bounded reconciliation run was dispatched
        required: false
        type: string

permissions:
  contents: read

run-name: ${{ github.event_name == 'workflow_dispatch' && format('Release {0}', inputs.dispatch_token) || github.workflow }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run checks
        run: make check

  build:
    name: Build Container
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare build metadata
        id: buildmeta
        shell: bash
        run: |
          created="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          commit="$(git rev-parse HEAD)"
          short_sha="${commit::12}"
          echo "version=dev-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "commit=${commit}" >> "$GITHUB_OUTPUT"
          echo "created=${created}" >> "$GITHUB_OUTPUT"
          echo "source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" >> "$GITHUB_OUTPUT"

      - name: Build image without publishing
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: gitops-dashboard:ci
          build-args: |
            VERSION=${{ steps.buildmeta.outputs.version }}
            COMMIT=${{ steps.buildmeta.outputs.commit }}
            BUILD_DATE=${{ steps.buildmeta.outputs.created }}
            SOURCE=${{ steps.buildmeta.outputs.source }}
          labels: |
            org.opencontainers.image.version=${{ steps.buildmeta.outputs.version }}
            org.opencontainers.image.revision=${{ steps.buildmeta.outputs.commit }}
            org.opencontainers.image.created=${{ steps.buildmeta.outputs.created }}
            org.opencontainers.image.source=${{ steps.buildmeta.outputs.source }}

      - name: Verify image version metadata
        shell: bash
        run: |
          output="$(docker run --rm gitops-dashboard:ci -version)"
          echo "$output"
          grep -F "${{ steps.buildmeta.outputs.version }}" <<< "$output"
          grep -F "${{ steps.buildmeta.outputs.commit }}" <<< "$output"
          grep -F "${{ steps.buildmeta.outputs.created }}" <<< "$output"

  release:
    name: Release Container
    needs: test
    if: (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: gitops-dashboard-release
      # GitHub Actions supports one running and one pending run per group; a
      # newer pending run replaces the older one. `queue: max` is not supported
      # by Actions, so a durable unbounded queue requires an external broker.
      cancel-in-progress: false
    permissions:
      contents: write
      packages: write
      # A stale serialized release may need to dispatch the current main head
      # through this workflow's normal test-gated release front door.
      actions: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select effective release version
        id: version
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          BUMP: ${{ inputs.bump || 'patch' }}
          EXPECTED_REVISION: ${{ inputs.expected_revision || '' }}
        run: |
          set -euo pipefail
          commit="$(git rev-parse HEAD)"
          if [[ "$EVENT_NAME" == workflow_dispatch && "$commit" != "$EXPECTED_REVISION" ]]; then
            echo 'dispatch revision does not match checked-out main revision' >&2
            exit 1
          fi
          if [[ "$EVENT_NAME" == push && "$GITHUB_REF" == refs/tags/* ]]; then
            [[ "$REF_NAME" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]] || { echo 'release tag is not strict SemVer' >&2; exit 1; }
            git fetch origin main
            git merge-base --is-ancestor "$commit" origin/main
            version="$REF_NAME"
          else
            [[ "$BUMP" =~ ^(patch|minor|major)$ ]] || { echo 'unsupported release bump' >&2; exit 1; }
            # The queue normally serializes writers; the compare-and-create
            # push below remains the authority when a runner is retried.
            for attempt in 1 2 3; do
              git fetch --tags --force origin
              tags="$({ git ls-remote --tags origin 'refs/tags/*' | awk '
                { ref=$2; sub("refs/tags/", "", ref); peeled=(ref ~ /\^\{\}$/); sub(/\^\{\}$/, "", ref); if (peeled || !(ref in value)) value[ref]=$1 }
                END { for (ref in value) print ref "\t" value[ref] }
              '; } | sort)"
              version="$(printf '%s' "$tags" | go run ./cmd/version-allocator --source "$commit" --bump "$BUMP")"
              if git ls-remote --exit-code --tags origin "refs/tags/$version" >/dev/null 2>&1; then
                remote_commit="$(git ls-remote --tags origin "refs/tags/$version^{}" | awk 'NR==1 {print $1}')"
                [[ -n "$remote_commit" ]] || remote_commit="$(git ls-remote --tags origin "refs/tags/$version" | awk 'NR==1 {print $1}')"
                [[ "$remote_commit" == "$commit" ]] || { echo "immutable release tag $version points at a different revision" >&2; exit 1; }
                break
              fi
              git -c user.name='gitops-dashboard release' -c user.email='release@localhost' tag -a "$version" -m "Release $version" "$commit"
              tag_oid="$(git rev-parse "refs/tags/$version")"
              if git push --no-follow-tags --force-with-lease="refs/tags/$version:" origin "refs/tags/$version"; then
                break
              fi
              remote_refs="$(git ls-remote --tags origin "refs/tags/$version" "refs/tags/$version^{}")"
              remote_direct="$(awk -v ref="refs/tags/$version" '$2 == ref { print $1; exit }' <<< "$remote_refs")"
              remote_peeled="$(awk -v ref="refs/tags/$version^{}" '$2 == ref { print $1; exit }' <<< "$remote_refs")"
              if [[ "$remote_direct" == "$tag_oid" && "$remote_peeled" == "$commit" ]]; then
                break
              fi
              git tag -d "$version"
              [[ -n "$remote_direct" || -n "$remote_peeled" ]] && { echo "immutable release tag $version was allocated concurrently" >&2; exit 1; }
              [[ "$attempt" == 3 ]] && { echo 'could not atomically allocate a release tag' >&2; exit 1; }
            done
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"
          echo "commit=$commit" >> "$GITHUB_OUTPUT"
          echo "short_sha=${commit::12}" >> "$GITHUB_OUTPUT"

      - name: Prepare build metadata
        id: buildmeta
        shell: bash
        run: |
          echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          echo "source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify immutable exact image
        id: existing
        shell: bash
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          VERSION: ${{ steps.version.outputs.value }}
          COMMIT: ${{ steps.version.outputs.commit }}
        run: |
          set -euo pipefail
          # A full image index has no config itself. Verify every platform
          # manifest's config labels before reusing an immutable exact tag.
          headers="$(mktemp)"
          trap 'rm -f "$headers"' EXIT
          auth="$(curl --fail --silent --show-error -u "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" "https://ghcr.io/token?service=ghcr.io&scope=repository:${GITHUB_REPOSITORY}:pull")"
          token="$(jq -er '.token // .access_token' <<< "$auth")"
          status="$(curl --silent --show-error -D "$headers" -o /tmp/release-index.json -w '%{http_code}' -H "Authorization: Bearer $token" -H 'Accept: application/vnd.oci.image.index.v1+json, application/vnd.docker.distribution.manifest.list.v2+json' "https://ghcr.io/v2/${GITHUB_REPOSITORY}/manifests/$VERSION")"
          if [[ "$status" == 404 ]]; then echo 'reuse=false' >> "$GITHUB_OUTPUT"; exit 0; fi
          [[ "$status" == 200 ]] || { echo "cannot inspect immutable image: HTTP $status" >&2; exit 1; }
          digest="$(awk 'tolower($1) == "docker-content-digest:" {print $2}' "$headers" | tr -d '\r' | tail -1)"
          [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]] || { echo 'immutable image response has no digest' >&2; exit 1; }
          for architecture in amd64 arm64; do
            count="$(jq --arg architecture "$architecture" '[.manifests[] | select(.platform.os == "linux" and .platform.architecture == $architecture)] | length' /tmp/release-index.json)"
            [[ "$count" == 1 ]] || { echo "immutable image must have exactly one linux/$architecture descriptor" >&2; exit 1; }
          done
          jq -er '.manifests[] | select(.platform.os == "linux" and (.platform.architecture == "amd64" or .platform.architecture == "arm64")) | .digest' /tmp/release-index.json | while read -r manifest; do
            curl --fail --silent --show-error -H "Authorization: Bearer $token" -H 'Accept: application/vnd.oci.image.manifest.v1+json, application/vnd.docker.distribution.manifest.v2+json' "https://ghcr.io/v2/${GITHUB_REPOSITORY}/manifests/$manifest" -o /tmp/release-manifest.json
            config="$(jq -er '.config.digest' /tmp/release-manifest.json)"
            curl --fail --silent --show-error -H "Authorization: Bearer $token" "https://ghcr.io/v2/${GITHUB_REPOSITORY}/blobs/$config" -o /tmp/release-config.json
            jq -e --arg version "$VERSION" --arg commit "$COMMIT" '.config.Labels["org.opencontainers.image.version"] == $version and .config.Labels["org.opencontainers.image.revision"] == $commit' /tmp/release-config.json >/dev/null || { echo "immutable image $VERSION has different version or revision metadata" >&2; exit 1; }
          done
          echo 'reuse=true' >> "$GITHUB_OUTPUT"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Build and publish immutable exact image
        id: push
        if: steps.existing.outputs.reuse != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ steps.version.outputs.value }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.value }}
            org.opencontainers.image.revision=${{ steps.version.outputs.commit }}
            org.opencontainers.image.created=${{ steps.buildmeta.outputs.created }}
            org.opencontainers.image.source=${{ steps.buildmeta.outputs.source }}
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
            COMMIT=${{ steps.version.outputs.commit }}
            BUILD_DATE=${{ steps.buildmeta.outputs.created }}
            SOURCE=${{ steps.buildmeta.outputs.source }}

      - name: Publish moving image channels
        id: channels
        shell: bash
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          VERSION: ${{ steps.version.outputs.value }}
          COMMIT: ${{ steps.version.outputs.commit }}
          EXACT_DIGEST: ${{ steps.push.outputs.digest || steps.existing.outputs.digest }}
          MAIN_RELEASE: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
          SHORT_SHA: ${{ steps.version.outputs.short_sha }}
        run: |
          set -euo pipefail
          [[ "$VERSION" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]
          major="v${BASH_REMATCH[1]}"; minor="v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
          highest_compatible_release() {
            local pattern="$1" candidate
            candidate="$(git ls-remote --tags origin 'refs/tags/v*' | awk '
              { ref=$2; sub("refs/tags/", "", ref); sub(/\^\{\}$/, "", ref) }
              ref ~ /^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$/ { print ref }
            ' | sort -u -V | while IFS= read -r tag; do [[ "$tag" =~ $pattern ]] && printf '%s\n' "$tag"; done | tail -1)"
            [[ -n "$candidate" ]] || { echo "no compatible strict SemVer release for $pattern" >&2; return 1; }
            printf '%s\n' "$candidate"
          }
          minor_version="$(highest_compatible_release "^${minor}\\.[0-9]+$")"
          major_version="$(highest_compatible_release "^${major}\\.[0-9]+\\.[0-9]+$")"
          minor_digest="$(docker buildx imagetools inspect "$IMAGE:$minor_version" --format '{{.Digest}}')"
          major_digest="$(docker buildx imagetools inspect "$IMAGE:$major_version" --format '{{.Digest}}')"
          [[ "$minor_digest" =~ ^sha256:[0-9a-f]{64}$ && "$major_digest" =~ ^sha256:[0-9a-f]{64}$ ]] || { echo 'channel source image has no OCI digest' >&2; exit 1; }
          # Recompute both channels from all exact tags. This makes a delayed
          # release converge forward instead of retargeting a channel backward.
          docker buildx imagetools create -t "$IMAGE:$minor" "$IMAGE@$minor_digest"
          docker buildx imagetools create -t "$IMAGE:$major" "$IMAGE@$major_digest"
          advance_latest_to_advanced_main() {
            local advanced_commit="$1" advanced_version advanced_digest
            advanced_version="$(git ls-remote --tags origin 'refs/tags/v*' | awk -v commit="$advanced_commit" '
              {
                ref=$2; sub("refs/tags/", "", ref); peeled=(ref ~ /\^\{\}$/); sub(/\^\{\}$/, "", ref)
                if (ref ~ /^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$/ && $1 == commit) print ref
              }
            ' | sort -u -V | tail -1)"
            [[ -n "$advanced_version" ]] || return 1
            advanced_digest="$(docker buildx imagetools inspect "$IMAGE:$advanced_version" --format '{{.Digest}}' 2>/dev/null || true)"
            [[ "$advanced_digest" =~ ^sha256:[0-9a-f]{64}$ ]] || return 1
            docker buildx imagetools create -t "$IMAGE:latest" "$IMAGE@$advanced_digest"
          }
          sha_published=false
          latest_published=false
          if [[ "$MAIN_RELEASE" == true ]]; then
            # The commit-specific reference is immutable evidence for every
            # accepted release, even when this queued run is no longer main.
            docker buildx imagetools create -t "$IMAGE:sha-$SHORT_SHA" "$IMAGE@$EXACT_DIGEST"
            sha_published=true

            # Keep the previous pointer so a main advance between the precheck
            # and registry write can be undone while this release job owns the
            # serialization group. CI never deletes registry content: if no
            # prior pointer exists and advanced main has not released yet, the
            # just-published digest remains latest until that release converges
            # the pointer forward.
            prior_latest_digest="$(docker buildx imagetools inspect "$IMAGE:latest" --format '{{.Digest}}' 2>/dev/null || true)"
            latest_allowed=false
            git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
            [[ "$COMMIT" == "$(git rev-parse origin/main)" ]] && latest_allowed=true
            if [[ "$latest_allowed" == true ]]; then
              docker buildx imagetools create -t "$IMAGE:latest" "$IMAGE@$EXACT_DIGEST"
              latest_published=true
            fi

            # Fetch again immediately after the write. If main advanced during
            # it, restore the previous pointer. With no usable previous
            # pointer, advance to advanced main's immutable release image when
            # available. Otherwise leave this successful release as latest;
            # the pending/queued advanced-main release converges it forward.
            git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
            if [[ "$latest_published" == true && "$COMMIT" != "$(git rev-parse origin/main)" ]]; then
              if [[ "$prior_latest_digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
                docker buildx imagetools create -t "$IMAGE:latest" "$IMAGE@$prior_latest_digest"
                latest_published=false
              elif advance_latest_to_advanced_main "$(git rev-parse origin/main)"; then
                latest_published=false
              fi
            fi
          fi
          echo "digest=$EXACT_DIGEST" >> "$GITHUB_OUTPUT"
          echo "minor_digest=$minor_digest" >> "$GITHUB_OUTPUT"
          echo "major_digest=$major_digest" >> "$GITHUB_OUTPUT"
          echo "sha_published=$sha_published" >> "$GITHUB_OUTPUT"
          echo "latest_published=$latest_published" >> "$GITHUB_OUTPUT"

      - name: Reconcile displaced main release
        # This repair must still evaluate when an earlier publication step
        # fails: a displaced current main head can already carry its allocated
        # tag while its exact image is absent. `!cancelled()` still preserves
        # the earlier failure in the job result, but never dispatches a new
        # release after an operator cancels the workflow.
        if: ${{ !cancelled() }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          RECONCILIATION_SOURCE: ${{ inputs.reconciliation_source || '' }}
          IMAGE: ghcr.io/${{ github.repository }}
        run: |
          set -euo pipefail
          commit="$(git rev-parse HEAD)"
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          main_commit="$(git rev-parse origin/main)"
          [[ "$commit" != "$main_commit" ]] || exit 0

          # A reconciliation-dispatched run may move on only to a strictly
          # newer main head. It never re-dispatches its own source head, so a
          # chain makes progress one head at a time instead of fanning out.
          if [[ "$EVENT_NAME" == workflow_dispatch && "$RECONCILIATION_SOURCE" == "$main_commit" ]]; then
            echo "reconciliation for $main_commit already dispatched by this run"
            exit 0
          fi
          if [[ "$EVENT_NAME" == workflow_dispatch && -n "$RECONCILIATION_SOURCE" ]] && ! git merge-base --is-ancestor "$RECONCILIATION_SOURCE" "$main_commit"; then
            echo "reconciliation target is not newer than its source" >&2
            exit 1
          fi

          version=""
          while IFS=$'\t' read -r tag tag_object; do
            tag_commit="$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$tag_object" --jq '.object.sha')"
            if [[ "$tag_commit" == "$main_commit" ]]; then
              version="${tag#refs/tags/}"
              break
            fi
          done < <(gh api --paginate "repos/$GITHUB_REPOSITORY/git/matching-refs/tags/" | jq -r '
            .[] | select(.ref | test("^refs/tags/v(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)$")) |
            select(.object.type == "tag") | [.ref, .object.sha] | @tsv
          ')

          active="$(gh api "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs?branch=main&per_page=100" | jq -r --arg commit "$main_commit" '
            any(.workflow_runs[]?; .head_sha == $commit and (.status == "queued" or .status == "in_progress"))
          ')"
          [[ "$active" == true ]] && exit 0

          # An allocated tag alone is not completion: the job creates it
          # before publishing every immutable and moving artifact. Re-dispatch
          # the same source/patch path until its exact image, SHA image,
          # latest-or-newer pointer, and GitHub Release all converge.
          complete=false
          if [[ -n "$version" ]]; then
            exact_digest="$(docker buildx imagetools inspect "$IMAGE:$version" --format '{{.Digest}}' 2>/dev/null || true)"
            sha_digest="$(docker buildx imagetools inspect "$IMAGE:sha-${main_commit:0:12}" --format '{{.Digest}}' 2>/dev/null || true)"
            latest_digest="$(docker buildx imagetools inspect "$IMAGE:latest" --format '{{.Digest}}' 2>/dev/null || true)"
            latest_at_or_past=false
            if [[ "$latest_digest" == "$exact_digest" && "$exact_digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              latest_at_or_past=true
            else
              while IFS=$'\t' read -r candidate _; do
                candidate="${candidate#refs/tags/}"
                [[ "$(printf '%s\n%s\n' "$version" "$candidate" | sort -V | tail -n1)" == "$candidate" ]] || continue
                candidate_digest="$(docker buildx imagetools inspect "$IMAGE:$candidate" --format '{{.Digest}}' 2>/dev/null || true)"
                [[ "$candidate_digest" == "$latest_digest" && "$latest_digest" =~ ^sha256:[0-9a-f]{64}$ ]] && { latest_at_or_past=true; break; }
              done < <(gh api --paginate "repos/$GITHUB_REPOSITORY/git/matching-refs/tags/" | jq -r '
                .[] | select(.ref | test("^refs/tags/v(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)$")) |
                select(.object.type == "tag") | [.ref, .object.sha] | @tsv
              ')
            fi
            if [[ "$exact_digest" =~ ^sha256:[0-9a-f]{64}$ && "$sha_digest" == "$exact_digest" && "$latest_at_or_past" == true ]] && gh api "repos/$GITHUB_REPOSITORY/releases/tags/$version" >/dev/null 2>&1; then
              complete=true
            fi
          fi
          [[ "$complete" == true ]] && exit 0

          # The duplicate-dispatch race is harmless: the dispatched run
          # reuses an existing exact source/patch allocation if one appears.
          gh api --method POST "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/dispatches" \
            -f ref=main \
            -f 'inputs[bump]=patch' \
            -f "inputs[expected_revision]=$main_commit" \
            -f "inputs[reconciliation_source]=$main_commit" \
            -f "inputs[dispatch_token]=reconcile-${main_commit:0:12}"

      - name: Create or repair GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.value }}
          COMMIT: ${{ steps.version.outputs.commit }}
          DIGEST: ${{ steps.channels.outputs.digest }}
          IMAGE: ghcr.io/${{ github.repository }}
          MAIN_RELEASE: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
          SHORT_SHA: ${{ steps.version.outputs.short_sha }}
          SHA_PUBLISHED: ${{ steps.channels.outputs.sha_published }}
          LATEST_PUBLISHED: ${{ steps.channels.outputs.latest_published }}
          MINOR_DIGEST: ${{ steps.channels.outputs.minor_digest }}
          MAJOR_DIGEST: ${{ steps.channels.outputs.major_digest }}
          CREATED: ${{ steps.buildmeta.outputs.created }}
        run: |
          set -euo pipefail
          tag_commit="$(git rev-parse "$VERSION^{}")"
          [[ "$tag_commit" == "$COMMIT" ]] || { echo "release tag $VERSION peels to a different commit" >&2; exit 1; }
          release_image_refs() {
            printf '%s\n' "- $IMAGE:$VERSION@$DIGEST" "- $IMAGE:${VERSION%.*}@$MINOR_DIGEST" "- $IMAGE:${VERSION%%.*}@$MAJOR_DIGEST"
            if [[ "$SHA_PUBLISHED" == true ]]; then printf '%s\n' "- $IMAGE:sha-$SHORT_SHA"; fi
            if [[ "$LATEST_PUBLISHED" == true ]]; then printf '%s\n' "- $IMAGE:latest@$DIGEST"; fi
          }
          generated_release_block() {
            cat <<EOF
          <!-- gitops-dashboard-release:start -->
          Digest: $DIGEST
          Commit: $COMMIT
          Timestamp: $CREATED
          Image refs:
          $(release_image_refs)
          <!-- gitops-dashboard-release:end -->
          EOF
          }
          generated="$(generated_release_block)"
          # generated-release-block validation start
          valid_generated_release_block() {
            local block="$1"
            grep -Fxq '<!-- gitops-dashboard-release:start -->' <<< "$block" &&
              grep -Fxq '<!-- gitops-dashboard-release:end -->' <<< "$block" &&
              grep -Fxq "Digest: $DIGEST" <<< "$block" &&
              grep -Fxq "Commit: $COMMIT" <<< "$block" &&
              grep -Eq '^Timestamp: .+$' <<< "$block" &&
              grep -Fxq 'Image refs:' <<< "$block" &&
              while IFS= read -r ref; do grep -Fxq -- "$ref" <<< "$block" || return 1; done < <(release_image_refs)
          }
          release_needs_repair() {
            local body="$1" block
            block="$(sed -n '/<!-- gitops-dashboard-release:start -->/,/<!-- gitops-dashboard-release:end -->/p' <<< "$body")"
            ! valid_generated_release_block "$block"
          }
          # generated-release-block validation end
          if existing="$(gh release view "$VERSION" --json body 2>/dev/null)"; then
            body="$(jq -r '.body // ""' <<< "$existing")"
            if ! release_needs_repair "$body"; then
              exit 0
            fi
            # Only append a missing generated block; never replace operator notes
            # or the release's original timestamp.
            gh release edit "$VERSION" --notes "$body

            $generated"
          else
            gh release create "$VERSION" --target "$COMMIT" --title "$VERSION" --notes "$generated"
          fi

      - name: Write image summary
        run: |
          {
            echo "## Published release image"
            echo "- Version: ${{ steps.version.outputs.value }}"
            echo "- Digest: ${{ steps.channels.outputs.digest }}"
            echo "- Commit: ${{ steps.version.outputs.commit }}"
          } >> "$GITHUB_STEP_SUMMARY"
