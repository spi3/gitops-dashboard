server:
  listen: ":18081"
  dataDir: "data/basic"
  repoCacheDir: "data/basic/repos"
auth:
  # Local testing only. The example credentials are admin/password.
  # Replace this with a bcrypt hash generated for your own password.
  mode: basic
  users:
    - username: admin
      passwordHash: "$2a$05$dSx9hFRBCW//D8TYRpxLf.gd8KNgi6C/New8A3K1uINKSfthilkga"
monitoring:
  defaultInterval: 30s
repositories: []
runtime:
  docker: []
  kubernetes: []
  http: []
  ping: []
